name: Release chart to helms repo
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version (např. 1.2.3)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
          fi
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
      # Pokud máš chart v podadresáři, uprav CHART_DIR
      - name: Package chart
        env:
          CHART_DIR: .
        run: |
          helm dependency update "$CHART_DIR" || true
          helm package "$CHART_DIR" --version "${{ steps.ver.outputs.ver }}" --destination dist
      - name: Checkout helms repo
        uses: actions/checkout@v4
        with:
          repository: tmeinlschmidt/helms
          path: helms
          token: ${{ secrets.HELMS_REPO_TOKEN }}

      - name: Copy package
        run: |
          mkdir -p helms/docs
          cp dist/*.tgz helms/docs/
      - name: Rebuild index.yaml (merge old)
        run: |
          cd helms/docs
          if [ -f index.yaml ]; then
            helm repo index . --url "https://tmeinlschmidt.github.io/helms" --merge index.yaml
          else
            helm repo index . --url "https://tmeinlschmidt.github.io/helms"
          fi
      - name: Commit & push
        run: |
          cd helms
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.yaml docs/*.tgz
          git commit -m "Publish helm chart homebridge ${{ steps.ver.outputs.ver }}" || exit 0
          git push
