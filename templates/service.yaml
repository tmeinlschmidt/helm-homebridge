apiVersion: v1
kind: Service
metadata:
  name: {{ include "homebridge.fullname" . }}
  labels:
    {{- include "homebridge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 51826
      targetPort: homekit
      protocol: TCP
      name: homekit
  selector:
    {{- include "homebridge.selectorLabels" . | nindent 4 }}
