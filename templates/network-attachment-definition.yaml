{{- if .Values.multusNetwork.enabled }}
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .Values.multusNetwork.name }}
  labels:
    {{- include "homebridge.labels" . | nindent 4 }}
spec:
  config: '{
    "cniVersion": "0.3.0",
    "type": "macvlan",
    "master": "{{ .Values.multusNetwork.master }}",
    "mode": "bridge",
    "ipam": {
      "type": "host-local",
      "subnet": "{{ .Values.multusNetwork.subnet }}",
      "rangeStart": "{{ .Values.multusNetwork.rangeStart }}",
      "rangeEnd": "{{ .Values.multusNetwork.rangeEnd }}",
      "routes": [
        { "dst": "0.0.0.0/0" }
      ],
      "gateway": "{{ .Values.multusNetwork.gateway }}"
    }
  }'
{{- end }}
