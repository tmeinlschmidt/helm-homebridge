{{- if .Values.multusNetwork.enabled }}
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .Values.multusNetwork.name }}
  labels:
    {{- include "homebridge.labels" . | nindent 4 }}
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "macvlan",
    "master": "eth0",
    "mode": "bridge",
    "ipam": {
      "type": "static"
    }
  }'
{{- end }}
