apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homebridge.fullname" . }}
  labels:
    {{- include "homebridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "homebridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.multusNetwork.enabled }}
        k8s.v1.cni.cncf.io/networks: '[{"name": "{{ .Values.multusNetwork.name }}", "ips": ["{{ .Values.multusNetwork.ip }}"], "gateway": ["{{ .Values.multusNetwork.gateway }}"]}]'
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "homebridge.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "homebridge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- if .Values.initialConfig.enabled }}
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ['sh', '-c']
          args:
            - |
              if [ ! -f /homebridge/config.json ]; then
                echo "Initializing config.json..."
                cp /config/config.json /homebridge/config.json
                echo "Config initialized successfully"
              else
                echo "Config already exists, skipping initialization"
              fi
          volumeMounts:
            - name: homebridge-data
              mountPath: /homebridge
            - name: initial-config
              mountPath: /config
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8581
              protocol: TCP
            - name: homekit
              containerPort: 51826
              protocol: TCP
            - name: mdns
              containerPort: 5353
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: homebridge-data
              mountPath: /homebridge
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: homebridge-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "homebridge.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.initialConfig.enabled }}
        - name: initial-config
          configMap:
            name: {{ include "homebridge.fullname" . }}-config
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
